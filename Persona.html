<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Registro de Pacientes</title>
    <link rel="stylesheet" href="estilospage.css">
</head>
<body>
    <header>
        <a href="index.html" class="btn-volver">Volver al Inicio</a>
        <h1>Registro de Pacientes (Cálculo IMC)</h1>
    </header>

    <main class="contenedor-principal">
        <section class="panel-formulario">
            <h2>Nuevo Paciente</h2>
            <form id="form-pacientes">
                <div class="grupo-input">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="grupo-input">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" required>
                </div>
                <div class="grupo-input">
                    <label for="edad">Edad (años):</label>
                    <input type="number" id="edad" min="1" required>
                </div>
                <div class="grupo-input">
                    <label for="altura">Altura (metros, ej: 1.75):</label>
                    <input type="number" id="altura" step="0.01" min="0.5" required>
                </div>
                <div class="grupo-input">
                    <label for="peso">Peso (kg):</label>
                    <input type="number" id="peso" step="0.1" min="2" required>
                </div>
                <button type="submit" class="btn-agregar">Agregar a la Tabla</button>
            </form>
        </section>

        <section class="panel-tabla">
            <h2>Listado Actual</h2>
            <table class="tabla-personas">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Edad</th>
                        <th>Altura (m)</th>
                        <th>Peso (kg)</th>
                        <th>IMC</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="personas.js"></script> 
</body>
</html>
